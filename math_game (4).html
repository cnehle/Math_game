<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Считай и играй</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

:root {
  --yellow:#FFD93D; --pink:#FF6B9D; --mint:#6BFFB8;
  --coral:#FF8C69;  --lav:#C3B1E1;  --white:#FFFDF4;
  --dark:#0f0c3a;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100%; height:100%;
  font-family:'Nunito',sans-serif;
  background:linear-gradient(150deg,#0f0c3a 0%,#1e1b6e 100%);
  overflow:hidden;
}

#bg { position:fixed; inset:0; pointer-events:none; z-index:0; }

/* ── main column ── */
#app {
  position:relative; z-index:1;
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center;
  padding:1vh 3vw 1vh;
  gap:1vh;
  overflow:hidden;
}

h1 {
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.2rem,4.5vw,2.6rem);
  color:var(--yellow);
  text-shadow:0 3px 0 #8a5c00,0 5px 12px rgba(0,0,0,.5);
  text-align:center;
  flex:0 0 auto;
  line-height:1;
}

.scorebar { display:flex; gap:2vw; flex:0 0 auto; }
.pill {
  background:rgba(255,255,255,.13);
  border:2px solid rgba(255,255,255,.28);
  border-radius:50px;
  padding:.28em .9em;
  color:var(--white);
  font-size:clamp(.75rem,2.2vw,1.05rem);
  font-weight:700;
}
.pill span { color:var(--yellow); font-family:'Fredoka One',cursive; }

/* ── card ── */
.card {
  background:rgba(255,255,255,.10);
  border:3px solid rgba(255,255,255,.22);
  border-radius:clamp(12px,2.5vw,24px);
  padding:clamp(6px,1.5vw,14px);
  width:100%; max-width:700px;
  backdrop-filter:blur(10px);
  box-shadow:0 6px 36px rgba(0,0,0,.35);
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(4px,1vh,10px);
  flex:0 0 auto;
}
.q-text {
  font-family:'Fredoka One',cursive;
  font-size:clamp(1rem,3.5vw,1.8rem);
  color:var(--white);
  line-height:1.2;
  text-align:center;
}

/*
  KEY FIX: SVG uses a fixed internal coord space (600×200).
  CSS makes it fill the card width while height scales automatically.
  preserveAspectRatio="xMidYMid meet" ensures nothing is ever clipped.
*/
#obj-svg {
  display:block;
  width:100%;
  height:auto;       /* scales with width via viewBox aspect ratio */
  max-height:38vh;   /* never gets too tall on landscape screens */
}

/* ── answer buttons ── */
.answers {
  display:flex; flex-wrap:wrap;
  gap:clamp(6px,2vw,14px);
  justify-content:center;
  width:100%; max-width:560px;
  flex:0 0 auto;
}
.ans-btn {
  background:none; border:none; cursor:pointer; outline:none; padding:0;
  /* 4 buttons must fit in a row with gaps — use % of container */
  width:clamp(60px,20vw,110px);
  height:clamp(60px,20vw,110px);
  transition:transform .12s;
  -webkit-tap-highlight-color:transparent;
}
.ans-btn:active { transform:scale(.88); }
.ans-btn svg { width:100%; height:100%; display:block; }

#feedback {
  font-family:'Fredoka One',cursive;
  font-size:clamp(.95rem,3.5vw,1.9rem);
  text-align:center;
  min-height:1.4em;
  flex:0 0 auto;
}
#feedback.correct { color:var(--mint); text-shadow:0 0 18px var(--mint); }
#feedback.wrong   { color:var(--pink); text-shadow:0 0 18px var(--pink); }

#next-btn {
  font-family:'Fredoka One',cursive;
  font-size:clamp(.9rem,3vw,1.4rem);
  color:var(--dark); background:var(--yellow);
  border:none; border-radius:50px;
  padding:.45em 2em; cursor:pointer;
  box-shadow:0 4px 0 #8a5c00,0 6px 16px rgba(0,0,0,.28);
  transition:transform .1s,box-shadow .1s;
  display:none; flex:0 0 auto;
}
#next-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #8a5c00; }

#complete {
  display:none; position:fixed; inset:0;
  background:rgba(10,8,45,.88); z-index:30;
  flex-direction:column; align-items:center; justify-content:center; gap:3vh;
}
#complete.show { display:flex; }
#complete h2 {
  font-family:'Fredoka One',cursive;
  font-size:clamp(2rem,9vw,4.5rem);
  color:var(--yellow);
  text-shadow:0 4px 0 #8a5c00,0 0 40px #ffcc00;
  animation:bounce .6s infinite alternate;
}
#complete p { color:var(--white); font-size:clamp(.9rem,3vw,1.3rem); font-weight:700; }
#restart-btn {
  font-family:'Fredoka One',cursive;
  font-size:clamp(.9rem,3vw,1.4rem);
  color:var(--dark); background:var(--mint);
  border:none; border-radius:50px;
  padding:.5em 2em; cursor:pointer;
  box-shadow:0 4px 0 #1a6a46;
}

@keyframes bounce    { to{ transform:translateY(-14px); } }
@keyframes floatY    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes popIn     { 0%{transform:scale(0) rotate(-20deg);opacity:0} 65%{transform:scale(1.15) rotate(4deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes celebrate { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(.7)} }
@keyframes correctPulse { from{transform:scale(1)} to{transform:scale(1.12)} }

/* Critical: SVG elements animate around their own bounding box centre */
#obj-svg g g {
  transform-box: fill-box;
  transform-origin: center center;
}
</style>
</head>
<body>

<svg id="bg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgr" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a277a"/>
      <stop offset="100%" stop-color="#080620"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="700" fill="url(#bgr)"/>
  <g id="star-g"></g>
  <circle cx="880" cy="72" r="46" fill="#ffe566" opacity=".85">
    <animate attributeName="opacity" values=".85;.95;.85" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="902" cy="57" r="37" fill="#110e3a"/>
</svg>

<div id="app">
  <h1>⭐ Считай и играй ⭐</h1>
  <div class="scorebar">
    <div class="pill">✅ Счёт: <span id="score-val">0</span></div>
    <div class="pill">🎯 Вопрос: <span id="q-num">1</span>/10</div>
  </div>
  <div class="card">
    <div class="q-text" id="q-text">Загрузка…</div>
    <!--
      viewBox is always "0 0 600 H" where H is computed per question.
      preserveAspectRatio="xMidYMid meet" = never clip, always show all content.
    -->
    <svg id="obj-svg" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="answers" id="answers"></div>
  <div id="feedback"></div>
  <button id="next-btn">Дальше ➜</button>
</div>

<div id="complete">
  <svg viewBox="0 0 160 160" width="120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="80" cy="80" r="72" fill="#FFD93D" opacity=".9">
      <animate attributeName="r" values="72;80;72" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-size="76">🎉</text>
  </svg>
  <h2>Молодец!</h2>
  <p id="final-txt"></p>
  <button id="restart-btn">Играть снова 🚀</button>
</div>

<script>
/* ── stars ── */
(function(){
  const ns='http://www.w3.org/2000/svg', g=document.getElementById('star-g');
  for(let i=0;i<80;i++){
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',Math.random()*1000); c.setAttribute('cy',Math.random()*700);
    c.setAttribute('r',Math.random()*2+.4); c.setAttribute('fill','white');
    const a=document.createElementNS(ns,'animate');
    a.setAttribute('attributeName','opacity'); a.setAttribute('values','1;0.05;1');
    a.setAttribute('dur',(Math.random()*3+1.5).toFixed(1)+'s');
    a.setAttribute('begin',(Math.random()*4).toFixed(1)+'s');
    a.setAttribute('repeatCount','indefinite');
    c.appendChild(a); g.appendChild(c);
  }
})();

/* ════════════════════════════════════════════════
   SHAPES
   All shapes are drawn centred on (0,0) and fit
   inside a ±28 unit bounding box (56×56 units).
   buildObjectsSVG() places them on a 600-wide
   fixed canvas, splitting into rows as needed.
   CSS width:100% + height:auto does the scaling.
════════════════════════════════════════════════ */

const SHAPES = [
  {
    name:'star',   question:'Сколько звёздочек ты видишь?',
    draw(cx,cy,d){ return `
      <g transform="translate(${cx},${cy})">
        <g style="animation:popIn .4s ${d}s cubic-bezier(.34,1.56,.64,1) both,floatY 2.6s ${d}s ease-in-out infinite">
          <polygon points="0,-26 6,-10 24,-10 10,3 15,22 0,10 -15,22 -10,3 -24,-10 -6,-10"
            fill="#FFD93D" stroke="#c8880a" stroke-width="2.5"/>
          <ellipse cx="-5" cy="-9" rx="6" ry="5" fill="rgba(255,255,255,.4)" transform="rotate(-30,-5,-9)"/>
        </g>
      </g>`;}
  },
  {
    name:'apple',  question:'Сколько яблок ты видишь?',
    draw(cx,cy,d){ return `
      <g transform="translate(${cx},${cy})">
        <g style="animation:popIn .4s ${d}s cubic-bezier(.34,1.56,.64,1) both,floatY 2.9s ${d}s ease-in-out infinite">
          <ellipse cx="0" cy="5" rx="20" ry="22" fill="#e74c3c" stroke="#922b21" stroke-width="2.5"/>
          <ellipse cx="-6" cy="-1" rx="7" ry="10" fill="rgba(255,255,255,.2)"/>
          <line x1="0" y1="-17" x2="0" y2="-27" stroke="#4a2c0a" stroke-width="3.5" stroke-linecap="round"/>
          <ellipse cx="7" cy="-25" rx="8" ry="6" fill="#27ae60" stroke="#1a6e3c" stroke-width="1.5" transform="rotate(-22,7,-25)"/>
        </g>
      </g>`;}
  },
  {
    name:'balloon',  question:'Сколько шариков ты видишь?',
    draw(cx,cy,d){ return `
      <g transform="translate(${cx},${cy})">
        <g style="animation:popIn .4s ${d}s cubic-bezier(.34,1.56,.64,1) both,floatY 3.1s ${d}s ease-in-out infinite">
          <ellipse cx="0" cy="-5" rx="18" ry="22" fill="#C3B1E1" stroke="#7d5db5" stroke-width="2.5"/>
          <ellipse cx="-6" cy="-13" rx="6" ry="8" fill="rgba(255,255,255,.28)"/>
          <polygon points="0,17 -5,23 5,23" fill="#7d5db5"/>
          <path d="M0,23 Q6,29 0,37 Q-6,45 0,51" fill="none" stroke="#7d5db5" stroke-width="2"/>
        </g>
      </g>`;}
  },
  {
    name:'fish',  question:'Сколько рыбок ты видишь?',
    draw(cx,cy,d){ return `
      <g transform="translate(${cx},${cy})">
        <g style="animation:popIn .4s ${d}s cubic-bezier(.34,1.56,.64,1) both,floatY 2.3s ${d}s ease-in-out infinite">
          <ellipse cx="-2" cy="0" rx="22" ry="14" fill="#6BFFB8" stroke="#1a7a56" stroke-width="2.5"/>
          <polygon points="20,0 33,-12 33,12" fill="#6BFFB8" stroke="#1a7a56" stroke-width="2.5"/>
          <circle cx="-12" cy="-4" r="4" fill="#1a7a56"/>
          <circle cx="-12" cy="-4" r="1.8" fill="white"/>
          <path d="M-4,-9 Q4,-14 12,-9" fill="none" stroke="#1a7a56" stroke-width="2"/>
        </g>
      </g>`;}
  },
  {
    name:'flower',  question:'Сколько цветочков ты видишь?',
    draw(cx,cy,d){ return `
      <g transform="translate(${cx},${cy})">
        <g style="animation:popIn .4s ${d}s cubic-bezier(.34,1.56,.64,1) both,floatY 3.3s ${d}s ease-in-out infinite">
          <ellipse cx="0"   cy="-20" rx="7" ry="12" fill="#FF8C69" stroke="#c24d1e" stroke-width="2"/>
          <ellipse cx="19"  cy="-6"  rx="7" ry="12" fill="#FF8C69" stroke="#c24d1e" stroke-width="2" transform="rotate(72,19,-6)"/>
          <ellipse cx="12"  cy="16"  rx="7" ry="12" fill="#FF8C69" stroke="#c24d1e" stroke-width="2" transform="rotate(144,12,16)"/>
          <ellipse cx="-12" cy="16"  rx="7" ry="12" fill="#FF8C69" stroke="#c24d1e" stroke-width="2" transform="rotate(216,-12,16)"/>
          <ellipse cx="-19" cy="-6"  rx="7" ry="12" fill="#FF8C69" stroke="#c24d1e" stroke-width="2" transform="rotate(288,-19,-6)"/>
          <circle cx="0" cy="0" r="12" fill="#FFD93D" stroke="#c8880a" stroke-width="2.5"/>
          <circle cx="-3" cy="-3" r="4" fill="rgba(255,255,255,.45)"/>
        </g>
      </g>`;}
  }
];

/* ════════════════════════════════════════════════
   BUILD OBJECTS SVG

   Strategy: use a fixed-width internal canvas of
   600 units. Objects are 56 units wide with gaps.
   Arrange into a grid; compute total height; set
   viewBox to "0 0 600 H". CSS scales it to fit.
   This NEVER clips anything.
════════════════════════════════════════════════ */
function buildObjectsSVG(count, shape, crossOutLast=0) {
  const SVG_W  = 600;   // fixed internal width (arbitrary units)
  const OBJ_R  = 28;    // object half-size in those units (logical cell)
  // Shapes visually extend ~35px from centre (flower petals, balloon tail, etc.)
  // plus the floatY animation moves them up ~6px → need at least 42px clearance.
  // Use 50 so there's a comfortable visible margin on all sides.
  const PAD    = 50;
  const GAP    = 24;    // extra gap between objects (beyond their radius)
  const STEP   = OBJ_R * 2 + GAP; // distance between object centres = 80

  // Fit as many columns as possible across SVG_W with padding
  const maxCols = Math.floor((SVG_W - PAD*2 + GAP) / STEP);
  const cols    = Math.min(count, maxCols);
  const rows    = Math.ceil(count / cols);
  const SVG_H   = rows * STEP + PAD * 2;

  const svg = document.getElementById('obj-svg');
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  // Do NOT set width/height attributes — let CSS control sizing entirely
  svg.removeAttribute('width');
  svg.removeAttribute('height');

  let html = '';
  for (let i = 0; i < count; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;

    // Centre each row (last row may be shorter)
    const rowLen   = (row === rows-1 && count % cols !== 0) ? (count % cols) : cols;
    const rowWidth = rowLen * STEP - GAP;
    const startX   = (SVG_W - rowWidth) / 2 + OBJ_R;

    const cx = startX + col * STEP;
    const cy = PAD    + row  * STEP + OBJ_R;
    const delay = (i * 0.08).toFixed(2);

    html += shape.draw(cx, cy, delay);

    // Cross-out marks for subtraction questions
    if (i >= count - crossOutLast) {
      const r  = OBJ_R - 2;
      const xd = (i * 0.08 + 0.35).toFixed(2);
      html += `
        <line x1="${cx-r}" y1="${cy-r}" x2="${cx+r}" y2="${cy+r}"
          stroke="#FF6B9D" stroke-width="6" stroke-linecap="round"
          style="animation:popIn .3s ${xd}s both"/>
        <line x1="${cx+r}" y1="${cy-r}" x2="${cx-r}" y2="${cy+r}"
          stroke="#FF6B9D" stroke-width="6" stroke-linecap="round"
          style="animation:popIn .3s ${xd}s both"/>`;
    }
  }
  svg.innerHTML = html;
}

/* ════════════════════════════════════════
   ANSWER BUTTONS
════════════════════════════════════════ */
const FILLS   = ['#FFD93D','#FF6B9D','#FF8C69','#C3B1E1'];
const STROKES = ['#8a5c00','#8a1040','#a03010','#5a3e8a'];

function buildButtons(correct) {
  const wrap = document.getElementById('answers');
  wrap.innerHTML = '';
  const wrongs = [];
  while (wrongs.length < 3) {
    // Stay within 0-10, cluster near the correct answer so it's challenging
    const lo = Math.max(0, correct-3);
    const hi = Math.min(10, correct+3);
    const w = rand(lo, hi);
    if (w !== correct && !wrongs.includes(w)) wrongs.push(w);
  }
  shuffle([correct, ...wrongs]).forEach((num, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.v = num;
    const f=FILLS[i], s=STROKES[i];
    btn.innerHTML = `<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="4" width="82" height="82" rx="20" fill="${f}" stroke="${s}" stroke-width="3"/>
      <rect x="10" y="9" width="30" height="14" rx="7" fill="rgba(255,255,255,.32)"/>
      <text x="45" y="56" text-anchor="middle" dominant-baseline="middle"
        font-family="Fredoka One,cursive" font-size="44" fill="${s}">${num}</text>
    </svg>`;
    btn.addEventListener('click', () => onAnswer(num, correct, btn));
    wrap.appendChild(btn);
  });
}

/* ════════════════════════════════════════
   GAME LOGIC
════════════════════════════════════════ */
let score=0, qIdx=0, answered=false;
const TOTAL=10;

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

// Question generators — numbers always go up to 10
// qIdx 0-9 maps to ranges: early=1-5, mid=3-8, late=5-10
function mkCount(qIdx){
  const maxN = qIdx < 3 ? 5 : qIdx < 6 ? 8 : 10;
  const minN = qIdx < 3 ? 1 : qIdx < 6 ? 3 : 5;
  const n=rand(minN, maxN);
  const sh=SHAPES[rand(0,SHAPES.length-1)];
  buildObjectsSVG(n,sh);
  return { text: sh.question, answer:n };
}
function mkAdd(qIdx){
  // a+b always ≤ 10; later questions use bigger numbers
  const maxSum = qIdx < 6 ? 7 : 10;
  const a=rand(1, Math.floor(maxSum/2));
  const b=rand(1, maxSum-a);
  const sh=SHAPES[rand(0,SHAPES.length-1)];
  buildObjectsSVG(a+b,sh);
  return { text:`${a} + ${b} = ?`, answer:a+b };
}
function mkSub(qIdx){
  const maxA = qIdx < 8 ? 8 : 10;
  const a=rand(4, maxA);
  const b=rand(1, a-1);
  const sh=SHAPES[rand(0,SHAPES.length-1)];
  buildObjectsSVG(a,sh,b);
  return { text:`${a} − ${b} = ?`, answer:a-b };
}

const scoreEl  = document.getElementById('score-val');
const qNumEl   = document.getElementById('q-num');
const qTextEl  = document.getElementById('q-text');
const feedback = document.getElementById('feedback');
const nextBtn  = document.getElementById('next-btn');
const complete = document.getElementById('complete');

function loadQ(){
  answered=false;
  feedback.textContent=''; feedback.className='';
  nextBtn.style.display='none';
  document.getElementById('answers').innerHTML='';
  // Clear progression: counting → mixed → subtraction
  let q;
  if      (qIdx < 3) q=mkCount(qIdx);                                          // Q1-3:  count only, 1-5
  else if (qIdx < 6) q=Math.random()<.5 ? mkAdd(qIdx) : mkCount(qIdx);         // Q4-6:  count+add, 3-8
  else               q=Math.random()<.5 ? mkSub(qIdx) : mkAdd(qIdx);            // Q7-10: add+sub,   5-10
  qTextEl.textContent=q.text;
  qNumEl.textContent=qIdx+1;
  buildButtons(q.answer);
}

function onAnswer(chosen,correct){
  if(answered) return;
  answered=true;
  if(chosen===correct){
    score++; scoreEl.textContent=score;
    feedback.textContent=['⭐ Правильно!','🎉 Да!','🌟 Отлично!','✅ Супер!','🥳 Молодец!'][rand(0,4)];
    feedback.className='correct';
    spawnCelebration();
  } else {
    feedback.textContent=['😊 Почти!','💛 Близко!','🔄 Попробуй ещё!','💪 Хорошая попытка!'][rand(0,3)];
    feedback.className='wrong';
    document.querySelectorAll('.ans-btn').forEach(b=>{
      if(+b.dataset.v===correct) {
        const svg = b.querySelector('svg');
        const rect = b.querySelector('rect');
        rect.setAttribute('fill','#00e676');
        rect.setAttribute('stroke','#ffffff');
        rect.setAttribute('stroke-width','5');
        svg.style.filter = 'drop-shadow(0 0 10px #00e676) drop-shadow(0 0 20px #00e676)';
        svg.style.animation = 'correctPulse 0.5s ease-in-out infinite alternate';
        // also update the number color to dark so it's readable on bright green
        b.querySelector('text').setAttribute('fill','#004d20');
      }
    });
  }
  nextBtn.style.display='inline-block';
}

function spawnCelebration(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 400 200');
  svg.style.cssText='position:fixed;top:20%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:20;width:min(400px,90vw);';
  ['⭐','🌟','✨','💫'].forEach((em,i)=>{
    for(let j=0;j<2;j++){
      const t=document.createElementNS(ns,'text');
      t.textContent=em;
      t.setAttribute('x',rand(20,380)); t.setAttribute('y',rand(30,160));
      t.setAttribute('font-size',rand(22,42));
      t.style.cssText=`animation:celebrate ${rand(7,13)/10}s ${(i*.1+j*.06).toFixed(2)}s ease-out both`;
      svg.appendChild(t);
    }
  });
  document.body.appendChild(svg);
  setTimeout(()=>svg.remove(),1500);
}

nextBtn.addEventListener('click',()=>{
  qIdx++;
  if(qIdx>=TOTAL){
    document.getElementById('final-txt').textContent=`Ты ответил правильно ${score} из ${TOTAL}! 🌟`;
    complete.classList.add('show');
  } else { loadQ(); }
});
document.getElementById('restart-btn').addEventListener('click',()=>{
  score=0; qIdx=0; scoreEl.textContent=0;
  complete.classList.remove('show');
  loadQ();
});

loadQ();
</script>
